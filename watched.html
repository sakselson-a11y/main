<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What I have watched 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #111;
      color: #eee;
      min-height: 100vh;
      padding: 32px 16px;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 32px;
      letter-spacing: .02em;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .card img {
      width: 100%;
      border-radius: 8px;
      aspect-ratio: 2/3;
      object-fit: cover;
      background: #222;
      display: block;
      transition: transform .25s, opacity .25s;
    }
    .card:hover img { transform: scale(1.04); opacity: .85; }

    .card .title {
      font-size: .9rem;
      text-align: center;
      color: #ddd;
      line-height: 1.3;
    }

    .card .desc {
      font-size: .78rem;
      text-align: center;
      color: #888;
      line-height: 1.4;
      max-width: 180px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card .no-poster {
      width: 100%;
      aspect-ratio: 2/3;
      background: #222;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: .8rem;
      text-align: center;
      padding: 16px;
    }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.92);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #lightbox.open { display: flex; }

    #lb-img-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      width: 100%;
      overflow: hidden;
    }
    #lb-img {
      max-width: 92vw;
      max-height: 80vh;
      border-radius: 8px;
      object-fit: contain;
      transition: opacity .15s;
      user-select: none;
    }

    .lb-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,.1);
      border: none;
      color: #fff;
      font-size: 1.8rem;
      width: 48px;
      height: 64px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s;
      z-index: 1;
    }
    .lb-btn:hover { background: rgba(255,255,255,.22); }
    #lb-prev { left: 12px; }
    #lb-next { right: 12px; }

    #lb-close {
      position: fixed;
      top: 16px; right: 20px;
      background: none;
      border: none;
      color: #ccc;
      font-size: 2rem;
      cursor: pointer;
      line-height: 1;
      transition: color .15s;
      z-index: 10;
    }
    #lb-close:hover { color: #fff; }

    #lb-caption {
      padding: 10px 16px 4px;
      font-size: 1rem;
      color: #eee;
      text-align: center;
      font-weight: 500;
      max-width: 600px;
      line-height: 1.5;
    }

    #counter {
      font-size: .8rem;
      color: #666;
      text-align: center;
      padding-bottom: 4px;
    }

    /* filmstrip */
    #filmstrip {
      display: flex;
      gap: 6px;
      padding: 8px 16px 16px;
      overflow-x: auto;
      max-width: 100vw;
      scrollbar-width: thin;
      scrollbar-color: #555 transparent;
    }
    .strip-thumb {
      flex-shrink: 0;
      width: 48px;
      height: 72px;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      opacity: .55;
      transition: opacity .15s, border-color .15s;
    }
    .strip-thumb.active { border-color: #fff; opacity: 1; }
    .strip-thumb img { width: 100%; height: 100%; object-fit: cover; }
  </style>
</head>
<body>

<h1>What I have watched 2026</h1>
<div id="grid"></div>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lb-close" title="Close (Esc)">&#x2715;</button>
  <div id="lb-img-wrap">
    <button class="lb-btn" id="lb-prev" title="Previous (←)">&#8249;</button>
    <img id="lb-img" src="" alt="">
    <button class="lb-btn" id="lb-next" title="Next (→)">&#8250;</button>
  </div>
  <div id="counter"></div>
  <div id="lb-caption"></div>
  <div id="filmstrip"></div>
</div>

<script>
  const API_KEY = '0083056b0be76892c6690d2421efddde';
  const IMG_BASE = 'https://image.tmdb.org/t/p/w500';

  const titles = [
    'Hundarna',
    'DTF St Louis',
    'Rooster',
    'Stranger Things',
    'One Battle After Another',
    'Pluribus',
    'Task',
    'Paradise',
  ];

  // Will hold {title, url} for cards that have a poster
  const items = [];

  let current = 0;

  const lightbox  = document.getElementById('lightbox');
  const lbImg     = document.getElementById('lb-img');
  const lbCaption = document.getElementById('lb-caption');
  const filmstrip = document.getElementById('filmstrip');
  const counter   = document.getElementById('counter');

  async function fetchInfo(title) {
    const url = `https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(title)}`;
    const res = await fetch(url);
    const data = await res.json();
    const result = data.results?.find(r => r.poster_path);
    if (!result) return null;
    return {
      poster: IMG_BASE + result.poster_path,
      desc: result.overview || '',
    };
  }

  async function render() {
    const grid = document.getElementById('grid');

    await Promise.all(titles.map(async title => {
      const info = await fetchInfo(title);
      const card = document.createElement('div');
      card.className = 'card';

      if (info) {
        const index = items.length;
        items.push({ title, url: info.poster, desc: info.desc });

        card.innerHTML = `
          <img src="${info.poster}" alt="${title}">
          <span class="title">${title}</span>
          <span class="desc">${info.desc}</span>
        `;
        card.addEventListener('click', () => openLightbox(index));

        // filmstrip thumb
        const ft = document.createElement('div');
        ft.className = 'strip-thumb';
        ft.id = `ft-${index}`;
        ft.innerHTML = `<img src="${info.poster}" alt="${title}">`;
        ft.addEventListener('click', () => goTo(index));
        filmstrip.appendChild(ft);
      } else {
        card.innerHTML = `
          <div class="no-poster">No poster found</div>
          <span class="title">${title}</span>
        `;
      }

      grid.appendChild(card);
    }));
  }

  function openLightbox(index) {
    current = index;
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
    updateLightbox();
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
  }

  function goTo(index) {
    current = (index + items.length) % items.length;
    updateLightbox();
  }

  function updateLightbox() {
    lbImg.style.opacity = '0';
    setTimeout(() => {
      lbImg.src = items[current].url;
      lbImg.alt = items[current].title;
      lbImg.onload = () => { lbImg.style.opacity = '1'; };
      lbCaption.innerHTML = `<strong>${items[current].title}</strong>${items[current].desc ? `<br><span style="font-size:.8rem;color:#aaa;font-weight:normal">${items[current].desc}</span>` : ''}`;
      counter.textContent = `${current + 1} / ${items.length}`;

      document.querySelectorAll('.strip-thumb').forEach((el, i) => {
        el.classList.toggle('active', i === current);
      });
      const active = document.getElementById(`ft-${current}`);
      if (active) active.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }, 80);
  }

  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  document.getElementById('lb-prev').addEventListener('click', () => goTo(current - 1));
  document.getElementById('lb-next').addEventListener('click', () => goTo(current + 1));

  lightbox.addEventListener('click', e => {
    if (e.target === lightbox) closeLightbox();
  });

  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'ArrowRight') goTo(current + 1);
    else if (e.key === 'ArrowLeft') goTo(current - 1);
    else if (e.key === 'Escape') closeLightbox();
  });

  // touch swipe
  let touchX = null;
  lbImg.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; });
  lbImg.addEventListener('touchend', e => {
    if (touchX === null) return;
    const dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 40) goTo(dx < 0 ? current + 1 : current - 1);
    touchX = null;
  });

  render();
</script>
</body>
</html>
