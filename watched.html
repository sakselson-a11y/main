<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What I have watched 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #111;
      color: #eee;
      min-height: 100vh;
      padding: 32px 16px;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 32px;
      letter-spacing: .02em;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .card img {
      width: 100%;
      border-radius: 8px;
      aspect-ratio: 2/3;
      object-fit: cover;
      background: #222;
      display: block;
    }

    .card .title {
      font-size: .9rem;
      text-align: center;
      color: #ddd;
      line-height: 1.3;
    }

    .card .no-poster {
      width: 100%;
      aspect-ratio: 2/3;
      background: #222;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: .8rem;
      text-align: center;
      padding: 16px;
    }
  </style>
</head>
<body>

<h1>What I have watched 2026</h1>
<div id="grid"></div>

<script>
  const API_KEY = '0083056b0be76892c6690d2421efddde';
  const IMG_BASE = 'https://image.tmdb.org/t/p/w500';

  const titles = [
    'Hundarna',
    'DTF St Louis',
    'Rooster',
    'Married at First Sight Australia',
    'Stranger Things',
  ];

  async function fetchPoster(title) {
    const url = `https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(title)}`;
    const res = await fetch(url);
    const data = await res.json();
    const result = data.results?.find(r => r.poster_path);
    return result ? IMG_BASE + result.poster_path : null;
  }

  async function render() {
    const grid = document.getElementById('grid');
    await Promise.all(titles.map(async title => {
      const card = document.createElement('div');
      card.className = 'card';

      const posterUrl = await fetchPoster(title);

      if (posterUrl) {
        card.innerHTML = `
          <img src="${posterUrl}" alt="${title}">
          <span class="title">${title}</span>
        `;
      } else {
        card.innerHTML = `
          <div class="no-poster">No poster found</div>
          <span class="title">${title}</span>
        `;
      }

      grid.appendChild(card);
    }));
  }

  render();
</script>
</body>
</html>
