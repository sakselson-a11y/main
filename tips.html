<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tips</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #111;
      color: #eee;
      min-height: 100vh;
      padding: 32px 16px;
    }

    nav {
      text-align: center;
      margin-bottom: 40px;
    }
    nav a {
      display: inline-block;
      padding: 8px 20px;
      background: #f5c800;
      color: #111;
      text-decoration: none;
      border-radius: 6px;
      font-size: .9rem;
      font-weight: 600;
      transition: background .15s;
    }
    nav a:hover { background: #ffd700; }

    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 32px;
      letter-spacing: .02em;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .poster-wrap {
      position: relative;
      width: 100%;
      border-radius: 8px;
      overflow: hidden;
      aspect-ratio: 2/3;
      background: #222;
    }

    .poster-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .25s, opacity .25s;
    }
    .card:hover .poster-wrap img { transform: scale(1.04); opacity: .85; }

    .ribbon {
      position: absolute;
      top: 10px;
      left: 0;
      padding: 4px 10px 4px 8px;
      font-size: .68rem;
      font-weight: 700;
      color: #fff;
      border-radius: 0 4px 4px 0;
      letter-spacing: .06em;
      text-transform: uppercase;
      pointer-events: none;
    }
    .ribbon-film { background: #c0392b; }
    .ribbon-tv   { background: #1a6fa8; }

    .card .title {
      font-size: .9rem;
      text-align: center;
      color: #ddd;
      line-height: 1.3;
    }

    .card .desc {
      font-size: .78rem;
      text-align: center;
      color: #888;
      line-height: 1.4;
      max-width: 180px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .providers {
      position: absolute;
      bottom: 8px;
      right: 8px;
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 4px;
      max-width: 80%;
    }
    .providers img {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      object-fit: cover;
      box-shadow: 0 1px 4px rgba(0,0,0,.6);
    }

    .card .no-poster {
      width: 100%;
      aspect-ratio: 2/3;
      background: #222;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: .8rem;
      text-align: center;
      padding: 16px;
    }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.92);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #lightbox.open { display: flex; }

    #lb-img-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }
    #lb-img {
      max-width: 90vw;
      max-height: 62vh;
      width: auto;
      height: auto;
      border-radius: 8px;
      object-fit: contain;
      transition: opacity .15s;
      user-select: none;
      display: block;
    }

    #lb-providers {
      position: absolute;
      bottom: 10px;
      right: calc(50% - min(46vw, 40vh * 2/3));
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      justify-content: flex-end;
      max-width: 40%;
      pointer-events: none;
      z-index: 2;
    }
    #lb-providers img {
      width: 36px;
      height: 36px;
      border-radius: 7px;
      object-fit: cover;
      box-shadow: 0 1px 5px rgba(0,0,0,.7);
    }

    #lb-ribbon {
      position: absolute;
      top: 10px;
      left: calc(50% - min(46vw, 40vh * 2/3));
      padding: 5px 12px 5px 10px;
      font-size: .75rem;
      font-weight: 700;
      color: #fff;
      border-radius: 0 4px 4px 0;
      letter-spacing: .06em;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 2;
    }

    .lb-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,.1);
      border: none;
      color: #fff;
      font-size: 1.8rem;
      width: 48px;
      height: 64px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s;
      z-index: 1;
    }
    .lb-btn:hover { background: rgba(255,255,255,.22); }
    #lb-prev { left: 12px; }
    #lb-next { right: 12px; }

    #lb-close {
      position: fixed;
      top: 16px; right: 20px;
      background: none;
      border: none;
      color: #ccc;
      font-size: 2rem;
      cursor: pointer;
      line-height: 1;
      transition: color .15s;
      z-index: 10;
    }
    #lb-close:hover { color: #fff; }

    #lb-caption {
      padding: 10px 16px 4px;
      font-size: 1rem;
      color: #eee;
      text-align: center;
      font-weight: 500;
      max-width: 600px;
      line-height: 1.5;
    }

    #counter {
      font-size: .8rem;
      color: #666;
      text-align: center;
      padding-bottom: 4px;
    }

    /* filmstrip */
    #filmstrip {
      display: flex;
      gap: 6px;
      padding: 8px 16px 16px;
      overflow-x: auto;
      max-width: 100vw;
      scrollbar-width: thin;
      scrollbar-color: #555 transparent;
    }
    .strip-thumb {
      flex-shrink: 0;
      width: 48px;
      height: 72px;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      opacity: .55;
      transition: opacity .15s, border-color .15s;
    }
    .strip-thumb.active { border-color: #fff; opacity: 1; }
    .strip-thumb img { width: 100%; height: 100%; object-fit: cover; }
  </style>
</head>
<body>

<h1>Tips</h1>
<nav><a href="watched.html">&larr; Filmer och serier jag rekommenderar</a></nav>
<div id="grid"></div>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lb-close" title="Close (Esc)">&#x2715;</button>
  <div id="lb-img-wrap">
    <button class="lb-btn" id="lb-prev" title="Previous (←)">&#8249;</button>
    <img id="lb-img" src="" alt="">
    <span id="lb-ribbon"></span>
    <div id="lb-providers"></div>
    <button class="lb-btn" id="lb-next" title="Next (→)">&#8250;</button>
  </div>
  <div id="counter"></div>
  <div id="lb-caption"></div>
  <div id="filmstrip"></div>
</div>

<script>
  const API_KEY = '0083056b0be76892c6690d2421efddde';
  const IMG_BASE = 'https://image.tmdb.org/t/p/w500';

  const shows = [
    { title: "Margo's Got Money Troubles" },
    { title: 'Hal & Harper' },
    { title: 'Love Story: John F. Kennedy Jr. & Carolyn Bessette', tmdbId: 131142, searchType: 'tv' },
  ];

  const items = [];
  let current = 0;

  const lightbox    = document.getElementById('lightbox');
  const lbImg       = document.getElementById('lb-img');
  const lbRibbon    = document.getElementById('lb-ribbon');
  const lbProviders = document.getElementById('lb-providers');
  const lbCaption   = document.getElementById('lb-caption');
  const filmstrip   = document.getElementById('filmstrip');
  const counter     = document.getElementById('counter');

  async function fetchInfo(show) {
    const mediaType = show.searchType ?? 'multi';
    let result;

    if (show.tmdbId) {
      const detailRes = await fetch(
        `https://api.themoviedb.org/3/${mediaType}/${show.tmdbId}?api_key=${API_KEY}`
      );
      result = await detailRes.json();
      result.id = show.tmdbId;
      if (!result.poster_path) return null;
    } else {
      const query = show.query ?? show.title;
      const endpoint = show.searchType
        ? `https://api.themoviedb.org/3/search/${show.searchType}?api_key=${API_KEY}&query=${encodeURIComponent(query)}`
        : `https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(query)}`;
      const searchRes = await fetch(endpoint);
      const searchData = await searchRes.json();
      result = searchData.results?.find(r => r.poster_path);
      if (!result) return null;
    }

    const resolvedType = show.tmdbId ? mediaType : (show.searchType ?? result.media_type);

    let seasons = result.number_of_seasons ?? null;
    if (resolvedType === 'tv' && seasons === null) {
      const tvRes = await fetch(
        `https://api.themoviedb.org/3/tv/${result.id}?api_key=${API_KEY}`
      );
      const tvData = await tvRes.json();
      seasons = tvData.number_of_seasons ?? null;
    }

    const provRes = await fetch(
      `https://api.themoviedb.org/3/${resolvedType}/${result.id}/watch/providers?api_key=${API_KEY}`
    );
    const provData = await provRes.json();
    const providers = [...(provData.results?.SE?.flatrate ?? []), ...(show.extraProviders ?? [])];

    return {
      poster: IMG_BASE + result.poster_path,
      desc:   result.overview || '',
      mediaType: resolvedType,
      seasons,
      providers,
    };
  }

  function ribbonHTML(info) {
    if (info.mediaType === 'movie') {
      return `<span class="ribbon ribbon-film">Film</span>`;
    }
    if (info.mediaType === 'tv' && info.seasons !== null) {
      const label = info.seasons === 1 ? '1 säsong' : `${info.seasons} säsonger`;
      return `<span class="ribbon ribbon-tv">${label}</span>`;
    }
    return '';
  }

  async function render() {
    const grid = document.getElementById('grid');

    await Promise.all(shows.map(async show => {
      const title = show.title ?? show;
      const info = await fetchInfo(typeof show === 'string' ? { title: show } : show);
      const card = document.createElement('div');
      card.className = 'card';

      if (info) {
        const index = items.length;
        items.push({ title, url: info.poster, desc: info.desc, mediaType: info.mediaType, seasons: info.seasons, providers: info.providers });

        const provLogos = info.providers.map(p =>
          `<img src="${p.logoUrl ?? `https://image.tmdb.org/t/p/w45${p.logo_path}`}" alt="${p.provider_name}" title="${p.provider_name}">`
        ).join('');

        card.innerHTML = `
          <div class="poster-wrap">
            <img src="${info.poster}" alt="${title}">
            ${ribbonHTML(info)}
            ${provLogos ? `<div class="providers">${provLogos}</div>` : ''}
          </div>
          <span class="title">${title}</span>
          <span class="desc">${info.desc}</span>
        `;
        card.addEventListener('click', () => openLightbox(index));

        const ft = document.createElement('div');
        ft.className = 'strip-thumb';
        ft.id = `ft-${index}`;
        ft.innerHTML = `<img src="${info.poster}" alt="${title}">`;
        ft.addEventListener('click', () => goTo(index));
        filmstrip.appendChild(ft);
      } else {
        card.innerHTML = `
          <div class="no-poster">No poster found</div>
          <span class="title">${title}</span>
        `;
      }

      grid.appendChild(card);
    }));
  }

  function openLightbox(index) {
    current = index;
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
    updateLightbox();
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
  }

  function goTo(index) {
    current = (index + items.length) % items.length;
    updateLightbox();
  }

  function updateLightbox() {
    lbImg.style.opacity = '0';
    setTimeout(() => {
      lbImg.src = items[current].url;
      lbImg.alt = items[current].title;
      lbImg.onload = () => { lbImg.style.opacity = '1'; };
      lbCaption.innerHTML = `<strong>${items[current].title}</strong>${items[current].desc ? `<br><span style="font-size:.8rem;color:#aaa;font-weight:normal">${items[current].desc}</span>` : ''}`;
      lbProviders.innerHTML = (items[current].providers ?? []).map(p =>
        `<img src="${p.logoUrl ?? `https://image.tmdb.org/t/p/w45${p.logo_path}`}" alt="${p.provider_name}" title="${p.provider_name}">`
      ).join('');
      const item = items[current];
      if (item.mediaType === 'movie') {
        lbRibbon.textContent = 'Film';
        lbRibbon.style.background = '#c0392b';
        lbRibbon.style.display = 'inline';
      } else if (item.mediaType === 'tv' && item.seasons !== null) {
        lbRibbon.textContent = item.seasons === 1 ? '1 säsong' : `${item.seasons} säsonger`;
        lbRibbon.style.background = '#1a6fa8';
        lbRibbon.style.display = 'inline';
      } else {
        lbRibbon.style.display = 'none';
      }
      counter.textContent = `${current + 1} / ${items.length}`;

      document.querySelectorAll('.strip-thumb').forEach((el, i) => {
        el.classList.toggle('active', i === current);
      });
      const active = document.getElementById(`ft-${current}`);
      if (active) active.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }, 80);
  }

  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  document.getElementById('lb-prev').addEventListener('click', () => goTo(current - 1));
  document.getElementById('lb-next').addEventListener('click', () => goTo(current + 1));

  lightbox.addEventListener('click', e => {
    if (e.target === lightbox) closeLightbox();
  });

  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'ArrowRight') goTo(current + 1);
    else if (e.key === 'ArrowLeft') goTo(current - 1);
    else if (e.key === 'Escape') closeLightbox();
  });

  let touchX = null;
  lbImg.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; });
  lbImg.addEventListener('touchend', e => {
    if (touchX === null) return;
    const dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 40) goTo(dx < 0 ? current + 1 : current - 1);
    touchX = null;
  });

  render();
</script>
</body>
</html>
