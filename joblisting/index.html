<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lediga tjänster</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --border: #e2e2e2;
      --text: #1a1a1a;
      --muted: #6b7280;
      --accent: #1d4ed8;
      --accent-hover: #1e40af;
      --radius: 10px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
      --shadow-hover: 0 4px 12px rgba(0,0,0,.12);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 32px 24px 24px;
    }
    .header-inner {
      max-width: 900px;
      margin: 0 auto;
    }
    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -.02em;
      margin-bottom: 6px;
    }
    header p.subtitle {
      color: var(--muted);
      font-size: .95rem;
    }

    /* ── Controls ── */
    .controls {
      max-width: 900px;
      margin: 24px auto;
      padding: 0 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-wrap {
      flex: 1;
      min-width: 200px;
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }
    #search {
      width: 100%;
      padding: 10px 12px 10px 38px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: .95rem;
      background: var(--surface);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    #search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(29,78,216,.12);
    }

    .filter-btn {
      padding: 10px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: .875rem;
      cursor: pointer;
      transition: all .15s;
      color: var(--muted);
      font-weight: 500;
      white-space: nowrap;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Results count ── */
    .results-meta {
      max-width: 900px;
      margin: 0 auto 12px;
      padding: 0 24px;
      font-size: .875rem;
      color: var(--muted);
    }

    /* ── Grouping ── */
    .job-list {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px 48px;
    }

    .country-section { margin-bottom: 36px; }

    .country-heading {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 0 10px;
      border-bottom: 2px solid var(--border);
      margin-bottom: 16px;
    }

    .city-section { margin-bottom: 20px; }

    .city-heading {
      font-size: .85rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .city-heading::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    .city-jobs {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-left: 14px;
    }

    /* ── Job card ── */
    .job-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      text-decoration: none;
      color: inherit;
      box-shadow: var(--shadow);
      transition: box-shadow .2s, transform .15s, border-color .15s;
    }
    .job-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-1px);
      border-color: #c7d2fe;
    }

    .job-info { flex: 1; min-width: 0; }
    .job-title {
      font-size: .95rem;
      font-weight: 600;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .job-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      font-size: .8rem;
      color: var(--muted);
      align-items: center;
    }
    .job-meta span { display: flex; align-items: center; gap: 4px; }

    .arrow-icon {
      flex-shrink: 0;
      color: var(--muted);
      transition: color .15s, transform .15s;
    }
    .job-card:hover .arrow-icon { color: var(--accent); transform: translateX(3px); }

    /* ── States ── */
    .state {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 24px;
      text-align: center;
      color: var(--muted);
    }
    .state .icon { font-size: 2.5rem; margin-bottom: 12px; }
    .state h2 { font-size: 1.1rem; margin-bottom: 6px; color: var(--text); }
    .state p { font-size: .9rem; line-height: 1.6; }

    #spinner { display: none; }
    #spinner.visible { display: block; }

    /* Spinner animation */
    .spin-ring {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 16px;
      font-size: .8rem;
      color: #bbb;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header h1 { font-size: 1.35rem; }
      .job-card { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1>Lediga tjänster</h1>
    <p class="subtitle">Alla öppna positioner samlade på ett ställe</p>
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="search" type="search" placeholder="Sök tjänst, avdelning, ort…" autocomplete="off">
  </div>
  <button class="filter-btn active" data-source="all">Alla</button>
  <button class="filter-btn" data-source="Teamtailor">Teamtailor</button>
  <button class="filter-btn" data-source="Homerun">Homerun</button>
</div>

<div class="results-meta" id="results-meta"></div>

<div id="spinner" class="state">
  <div class="spin-ring"></div>
  <p>Hämtar tjänster…</p>
</div>

<div id="error-msg" class="state" style="display:none">
  <div class="icon">⚠️</div>
  <h2>Kunde inte hämta tjänster</h2>
  <p id="error-text"></p>
</div>

<div id="empty-msg" class="state" style="display:none">
  <div class="icon">🔍</div>
  <h2>Inga tjänster hittades</h2>
  <p>Prova ett annat sökord eller ta bort filtret.</p>
</div>

<div class="job-list" id="job-list"></div>

<footer id="footer"></footer>

<script>
  const jobListEl   = document.getElementById('job-list');
  const searchEl    = document.getElementById('search');
  const resultsEl   = document.getElementById('results-meta');
  const spinnerEl   = document.getElementById('spinner');
  const errorEl     = document.getElementById('error-msg');
  const errorTextEl = document.getElementById('error-text');
  const emptyEl     = document.getElementById('empty-msg');
  const footerEl    = document.getElementById('footer');

  let allJobs = [];
  let activeSource = 'all';

  // ── Fetch data ─────────────────────────────────────────────────
  async function loadJobs() {
    spinnerEl.classList.add('visible');
    try {
      const resp = await fetch('./jobs.json', { cache: 'no-cache' });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();

      allJobs = data.jobs || [];

      if (data.updated_at) {
        const d = new Date(data.updated_at);
        footerEl.textContent = `Senast uppdaterad: ${d.toLocaleString('sv-SE')}`;
      }

      if (data.errors?.length) {
        console.warn('API errors:', data.errors);
      }

      render();
    } catch (err) {
      spinnerEl.classList.remove('visible');
      errorEl.style.display = 'block';
      errorTextEl.textContent = err.message;
    } finally {
      spinnerEl.classList.remove('visible');
    }
  }

  // ── Country code → display name ────────────────────────────────
  const COUNTRY_NAMES = {
    AF:'Afghanistan',AL:'Albania',DZ:'Algeria',AD:'Andorra',AO:'Angola',
    AR:'Argentina',AM:'Armenia',AU:'Australia',AT:'Austria',AZ:'Azerbaijan',
    BE:'Belgium',BG:'Bulgaria',BA:'Bosnia and Herzegovina',BR:'Brazil',
    CA:'Canada',CL:'Chile',CN:'China',CO:'Colombia',HR:'Croatia',CZ:'Czech Republic',
    DK:'Denmark',EG:'Egypt',EE:'Estonia',FI:'Finland',FR:'France',
    GE:'Georgia',DE:'Germany',GH:'Ghana',GR:'Greece',HU:'Hungary',
    IS:'Iceland',IN:'India',ID:'Indonesia',IE:'Ireland',IL:'Israel',
    IT:'Italy',JP:'Japan',KZ:'Kazakhstan',KE:'Kenya',LV:'Latvia',
    LT:'Lithuania',LU:'Luxembourg',MY:'Malaysia',MT:'Malta',MX:'Mexico',
    MD:'Moldova',ME:'Montenegro',MA:'Morocco',NL:'Netherlands',NZ:'New Zealand',
    MK:'North Macedonia',NO:'Norway',PK:'Pakistan',PL:'Poland',PT:'Portugal',
    RO:'Romania',RS:'Serbia',SG:'Singapore',SK:'Slovakia',SI:'Slovenia',
    ZA:'South Africa',KR:'South Korea',ES:'Spain',SE:'Sweden',
    CH:'Switzerland',TW:'Taiwan',TH:'Thailand',TR:'Turkey',UA:'Ukraine',
    AE:'United Arab Emirates',GB:'United Kingdom',US:'United States',UZ:'Uzbekistan',
    VN:'Vietnam',
  };

  function parseLocation(loc) {
    if (!loc) return { city: '', country: '' };
    const parts = loc.split(',').map(s => s.trim()).filter(Boolean);
    if (parts.length >= 2) {
      const code  = parts[parts.length - 1].toUpperCase();
      const country = COUNTRY_NAMES[code] || parts[parts.length - 1];
      const city    = parts.slice(0, parts.length - 1).join(', ');
      return { city, country };
    }
    // single value — check if it's a known country code
    const code = parts[0].toUpperCase();
    if (COUNTRY_NAMES[code]) return { city: '', country: COUNTRY_NAMES[code] };
    return { city: parts[0], country: '' };
  }

  function groupJobs(jobs) {
    // Returns { countryName: { cityName: [jobs] } }, sorted alphabetically
    // Sweden always first if present
    const map = {};
    for (const job of jobs) {
      const { city, country } = parseLocation(job.location);
      const c = country || 'Other';
      const k = city    || 'Unknown location';
      (map[c] ??= {})[k] ??= [];
      map[c][k].push(job);
    }
    const sorted = Object.keys(map).sort((a, b) => {
      if (a === 'Sweden')  return -1;
      if (b === 'Sweden')  return  1;
      if (a === 'Other')   return  1;
      if (b === 'Other')   return -1;
      return a.localeCompare(b);
    });
    const result = {};
    for (const country of sorted) {
      result[country] = Object.fromEntries(
        Object.entries(map[country]).sort(([a], [b]) => a.localeCompare(b))
      );
    }
    return result;
  }

  function makeJobCard(job) {
    const a = document.createElement('a');
    a.className = 'job-card';
    a.href = job.url || '#';
    a.target = '_blank';
    a.rel = 'noopener noreferrer';

    const metaParts = [];
    if (job.department) metaParts.push(`
      <span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
        </svg>${escHtml(job.department)}
      </span>`);

    a.innerHTML = `
      <div class="job-info">
        <div class="job-title">${escHtml(job.title)}</div>
        ${metaParts.length ? `<div class="job-meta">${metaParts.join('')}</div>` : ''}
      </div>
      <svg class="arrow-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
      </svg>`;
    return a;
  }

  // ── Render ─────────────────────────────────────────────────────
  function render() {
    const q = searchEl.value.trim().toLowerCase();

    const filtered = allJobs.filter(job => {
      if (activeSource !== 'all' && job.source !== activeSource) return false;
      if (!q) return true;
      return (
        job.title.toLowerCase().includes(q) ||
        (job.department || '').toLowerCase().includes(q) ||
        (job.location   || '').toLowerCase().includes(q)
      );
    });

    jobListEl.innerHTML = '';
    emptyEl.style.display = 'none';

    if (filtered.length === 0) {
      emptyEl.style.display = 'block';
      resultsEl.textContent = '';
      return;
    }

    const total = allJobs.length;
    resultsEl.textContent =
      filtered.length === total
        ? `${total} lediga tjänster`
        : `${filtered.length} av ${total} tjänster`;

    const grouped = groupJobs(filtered);

    for (const [country, cities] of Object.entries(grouped)) {
      const countryEl = document.createElement('div');
      countryEl.className = 'country-section';
      countryEl.innerHTML = `<div class="country-heading">${escHtml(country)}</div>`;

      for (const [city, jobs] of Object.entries(cities)) {
        const cityEl = document.createElement('div');
        cityEl.className = 'city-section';
        cityEl.innerHTML = `<div class="city-heading">${escHtml(city)}</div>`;

        const cityJobsEl = document.createElement('div');
        cityJobsEl.className = 'city-jobs';
        jobs.forEach(job => cityJobsEl.appendChild(makeJobCard(job)));

        cityEl.appendChild(cityJobsEl);
        countryEl.appendChild(cityEl);
      }

      jobListEl.appendChild(countryEl);
    }
  }

  function escHtml(str) {
    return String(str ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Events ─────────────────────────────────────────────────────
  searchEl.addEventListener('input', render);

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeSource = btn.dataset.source;
      render();
    });
  });

  loadJobs();
</script>
</body>
</html>
