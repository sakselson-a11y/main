<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #111;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Drop zone ── */
    #drop-zone {
      border: 2px dashed #444;
      border-radius: 12px;
      margin: 32px auto;
      padding: 40px 24px;
      max-width: 600px;
      width: 90%;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    #drop-zone.drag-over { border-color: #888; background: #1e1e1e; }
    #drop-zone svg { opacity: .4; margin-bottom: 12px; }
    #drop-zone p { color: #aaa; font-size: .95rem; line-height: 1.6; }
    #drop-zone label {
      display: inline-block;
      margin-top: 14px;
      padding: 8px 20px;
      background: #c0392b;
      border-radius: 6px;
      cursor: pointer;
      font-size: .9rem;
      transition: background .15s;
    }
    #drop-zone label:hover { background: #e74c3c; }
    #file-input { display: none; }

    /* ── Gallery grid ── */
    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 10px;
      padding: 0 16px 32px;
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
    }
    #gallery.hidden { display: none; }

    .thumb {
      position: relative;
      overflow: hidden;
      border-radius: 6px;
      cursor: pointer;
      background: #1a1a1a;
      aspect-ratio: 4/3;
    }
    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .25s, opacity .25s;
      display: block;
    }
    .thumb:hover img { transform: scale(1.04); opacity: .85; }
    .thumb .label {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 6px 10px;
      background: linear-gradient(transparent, rgba(0,0,0,.7));
      font-size: .75rem;
      color: #ddd;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0;
      transition: opacity .2s;
    }
    .thumb:hover .label { opacity: 1; }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.92);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #lightbox.open { display: flex; }

    #lb-img-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      width: 100%;
      overflow: hidden;
    }
    #lb-img {
      max-width: 92vw;
      max-height: 85vh;
      border-radius: 4px;
      object-fit: contain;
      transition: opacity .15s;
      user-select: none;
    }

    .lb-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,.1);
      border: none;
      color: #fff;
      font-size: 1.8rem;
      width: 48px;
      height: 64px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s;
      z-index: 1;
    }
    .lb-btn:hover { background: rgba(255,255,255,.22); }
    #lb-prev { left: 12px; }
    #lb-next { right: 12px; }

    #lb-close {
      position: fixed;
      top: 16px; right: 20px;
      background: none;
      border: none;
      color: #ccc;
      font-size: 2rem;
      cursor: pointer;
      line-height: 1;
      transition: color .15s;
    }
    #lb-close:hover { color: #fff; }

    #lb-caption {
      padding: 10px 0 4px;
      font-size: .85rem;
      color: #aaa;
      text-align: center;
    }

    /* filmstrip */
    #filmstrip {
      display: flex;
      gap: 6px;
      padding: 8px 16px 16px;
      overflow-x: auto;
      max-width: 100vw;
      scrollbar-width: thin;
      scrollbar-color: #555 transparent;
    }
    .strip-thumb {
      flex-shrink: 0;
      width: 72px;
      height: 54px;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color .15s;
      opacity: .55;
      transition: opacity .15s, border-color .15s;
    }
    .strip-thumb.active { border-color: #fff; opacity: 1; }
    .strip-thumb img { width: 100%; height: 100%; object-fit: cover; }

    #counter {
      font-size: .8rem;
      color: #666;
      text-align: center;
      padding-bottom: 4px;
    }
  </style>
</head>
<body>

<h1 style="text-align:center; padding: 24px 0 0; font-size: 2rem;">Kolla bilderna</h1>

<div id="drop-zone">
  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
    <polyline points="21 15 16 10 5 21"/>
  </svg>
  <p>Drag &amp; drop images here<br>or click to select files</p>
  <label for="file-input">Browse images</label>
  <input id="file-input" type="file" accept="image/*" multiple>
</div>

<div id="gallery" class="hidden"></div>

<div id="lightbox">
  <button id="lb-close" title="Close (Esc)">&#x2715;</button>
  <div id="lb-img-wrap">
    <button class="lb-btn" id="lb-prev" title="Previous (←)">&#8249;</button>
    <img id="lb-img" src="" alt="">
    <button class="lb-btn" id="lb-next" title="Next (→)">&#8250;</button>
  </div>
  <div id="counter"></div>
  <div id="lb-caption"></div>
  <div id="filmstrip"></div>
</div>

<script>
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const gallery = document.getElementById('gallery');
  const lightbox = document.getElementById('lightbox');
  const lbImg = document.getElementById('lb-img');
  const lbCaption = document.getElementById('lb-caption');
  const filmstrip = document.getElementById('filmstrip');
  const counter = document.getElementById('counter');

  let images = []; // {url, name}
  let current = 0;

  // ── File loading ──────────────────────────────────────────────
  function loadFiles(files) {
    const prev = images.length;
    [...files].filter(f => f.type.startsWith('image/')).forEach(f => {
      const url = URL.createObjectURL(f);
      images.push({ url, name: f.name });
    });
    if (images.length === prev) return;
    renderGallery();
    dropZone.style.display = 'none';
    gallery.classList.remove('hidden');
  }

  fileInput.addEventListener('change', e => loadFiles(e.target.files));

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    loadFiles(e.dataTransfer.files);
  });
  dropZone.addEventListener('click', e => {
    if (e.target !== dropZone && e.target.tagName !== 'P' && e.target.tagName !== 'SVG' && e.target.tagName !== 'circle' && e.target.tagName !== 'polyline' && e.target.tagName !== 'rect') return;
    fileInput.click();
  });

  // ── Gallery rendering ─────────────────────────────────────────
  function renderGallery() {
    gallery.innerHTML = '';
    filmstrip.innerHTML = '';
    images.forEach((img, i) => {
      // grid thumb
      const div = document.createElement('div');
      div.className = 'thumb';
      div.innerHTML = `<img src="${img.url}" alt="${img.name}" loading="lazy"><span class="label">${img.name}</span>`;
      div.addEventListener('click', () => openLightbox(i));
      gallery.appendChild(div);

      // filmstrip thumb
      const ft = document.createElement('div');
      ft.className = 'strip-thumb';
      ft.id = `ft-${i}`;
      ft.innerHTML = `<img src="${img.url}" alt="">`;
      ft.addEventListener('click', () => goTo(i));
      filmstrip.appendChild(ft);
    });
  }

  // ── Lightbox ──────────────────────────────────────────────────
  function openLightbox(index) {
    current = index;
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
    updateLightbox();
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
  }

  function goTo(index) {
    current = (index + images.length) % images.length;
    updateLightbox();
  }

  function updateLightbox() {
    lbImg.style.opacity = '0';
    setTimeout(() => {
      lbImg.src = images[current].url;
      lbImg.alt = images[current].name;
      lbImg.onload = () => { lbImg.style.opacity = '1'; };
      lbCaption.textContent = images[current].name;
      counter.textContent = `${current + 1} / ${images.length}`;

      document.querySelectorAll('.strip-thumb').forEach((el, i) => {
        el.classList.toggle('active', i === current);
      });
      const active = document.getElementById(`ft-${current}`);
      if (active) active.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }, 80);
  }

  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  document.getElementById('lb-prev').addEventListener('click', () => goTo(current - 1));
  document.getElementById('lb-next').addEventListener('click', () => goTo(current + 1));

  lightbox.addEventListener('click', e => {
    if (e.target === lightbox) closeLightbox();
  });

  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'ArrowRight') goTo(current + 1);
    else if (e.key === 'ArrowLeft') goTo(current - 1);
    else if (e.key === 'Escape') closeLightbox();
  });

  // touch swipe
  let touchX = null;
  lbImg.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; });
  lbImg.addEventListener('touchend', e => {
    if (touchX === null) return;
    const dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 40) goTo(dx < 0 ? current + 1 : current - 1);
    touchX = null;
  });
</script>
</body>
</html>
